<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Vivek Chauhan — Senior Full-Stack Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6EA8FE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6EA8FE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6EA8FE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6EA8FE"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orbBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6EA8FE" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6EA8FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.6" fill="#6EA8FE" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>

  <!-- animated glow orbs -->
  <circle cx="980" cy="95" r="130" fill="url(#orbBlue)">
    <animate attributeName="cy" values="95;150;95" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1085" cy="225" r="150" fill="url(#orbPurple)">
    <animate attributeName="cy" values="225;180;225" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- twinkling accent dots -->
  <circle cx="900" cy="70" r="3" fill="#6EA8FE">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1130" cy="120" r="2.5" fill="#A78BFA">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="250" r="2.5" fill="#6EA8FE">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- left accent bar -->
  <rect x="64" y="72" width="4" height="156" rx="2" fill="url(#bar)"/>

  <!-- text block -->
  <g font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="92" y="122" font-size="48" font-weight="700" fill="#F1F5F9">Vivek Chauhan</text>

    <text x="94" y="162" font-size="24" font-weight="600" fill="url(#accent)">Senior Full-Stack Engineer</text>

    <!-- underline with a moving shine -->
    <rect x="94" y="176" width="300" height="3" rx="1.5" fill="#1E293B"/>
    <rect x="94" y="176" width="120" height="3" rx="1.5" fill="url(#sweep)">
      <animate attributeName="x" values="94;274;94" dur="4s" repeatCount="indefinite"/>
    </rect>

    <text x="94" y="208" font-size="16" fill="#94A3B8">TypeScript &#183; Node.js &#183; React &#183; AWS &#183; System Design (HLD/LLD)</text>

    <!-- availability pill -->
    <g>
      <rect x="92" y="230" width="306" height="32" rx="16" fill="#0c2018" stroke="#22C55E" stroke-opacity="0.45"/>
      <circle cx="114" cy="246" r="5" fill="#22C55E">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="128" y="251" font-size="13.5" font-weight="600" fill="#86EFAC">Open to remote senior full-stack roles</text>
    </g>
  </g>
</svg>
